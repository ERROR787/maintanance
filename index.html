<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maintenance Status Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-left: #6A8DFF;
            --bg-right: #7B61FF;
            --primary: #5B6EF5;
            --primary-dark: #2F5BFF;
            --primary-soft: rgba(91, 110, 245, 0.12);
            --surface: rgba(245, 247, 251, 0.92);
            --surface-solid: #F5F7FB;
            --input-bg: #E9EEF6;
            --border: #D6DCE8;
            --text-primary: #2D2F36;
            --text-secondary: #6B7280;
            --success: #22C55E;
            --danger: #EF4444;
            --danger-dark: #DC2626;
            --alert-bg: #FDECEC;
            --alert-border: #F5B5B5;
            --shadow: 0 20px 60px rgba(28, 40, 120, 0.22);
            --soft-shadow: 0 10px 30px rgba(28, 40, 120, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            width: 100%;
            min-height: 100%;
            font-size: 16px;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
            touch-action: pan-y;
        }

        body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-left), var(--bg-right));
            overflow-x: hidden;
            overflow-y: auto;
            padding: 24px 16px;
            position: relative;
            animation: fadeInPage 0.55s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.24) 0%, transparent 32%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.16) 0%, transparent 35%);
            pointer-events: none;
            z-index: 0;
            animation: bgFloat 16s ease-in-out infinite alternate;
        }

        @keyframes bgFloat {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(-12px, -10px, 0) scale(1.03); }
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-wrap {
            width: 100%;
            min-height: calc(100vh - 48px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            animation: cardUp 0.65s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardUp {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.85rem, 5.5vw, 2.55rem);
            line-height: 1.12;
            font-weight: 900;
            text-align: center;
            margin-bottom: 1.7rem;
            background: linear-gradient(135deg, var(--primary-dark), var(--bg-right));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            filter: drop-shadow(0 8px 18px rgba(91,110,245,0.18));
        }

        .form-group {
            margin-bottom: 1.18rem;
            animation: fieldIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .form-group.no-margin {
            margin-bottom: 0;
        }

        .form-group:nth-of-type(1) { animation-delay: 0.08s; }
        .form-group:nth-of-type(2) { animation-delay: 0.14s; }
        .form-group:nth-of-type(3) { animation-delay: 0.20s; }
        .form-group:nth-of-type(4) { animation-delay: 0.26s; }

        @keyframes fieldIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        label .required {
            color: var(--danger);
            margin-left: 4px;
        }

        select,
        input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            background: rgba(233, 238, 246, 0.9);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            box-shadow: 0 6px 18px rgba(28, 40, 120, 0.06);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
        }

        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%235B6EF5' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 44px;
        }

        select:focus,
        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(91, 110, 245, 0.13), 0 10px 24px rgba(91, 110, 245, 0.16);
            transform: translateY(-1px);
        }

        select:hover,
        input:hover {
            border-color: rgba(91, 110, 245, 0.55);
        }

        .info-card {
            background: rgba(255,255,255,0.58);
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 18px;
            padding: 1.2rem;
            margin-top: 1.2rem;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
            display: none;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .info-card.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .info-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.12rem;
            margin-bottom: 0.85rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card h3::before {
            content: '▪';
            color: var(--primary-dark);
            font-size: 1.35rem;
        }

        .info-row,
        .modal-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 0.7rem 0;
            border-bottom: 1px solid rgba(107, 114, 128, 0.15);
        }

        .info-row:last-child,
        .modal-row:last-child {
            border-bottom: none;
        }

        .info-label,
        .modal-label {
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        .info-value,
        .modal-value {
            color: var(--text-primary);
            font-weight: 700;
            text-align: right;
            word-break: break-word;
        }

        .info-value.amount,
        .modal-value.highlight {
            color: var(--success);
            font-size: 1.05rem;
            font-weight: 800;
        }

        .info-value.pending {
            color: var(--danger-dark);
        }

        .chips-label {
            margin-top: 0.75rem;
            margin-bottom: 0.55rem;
            font-size: 0.86rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            display: none;
        }

        .chips-label.visible {
            display: block;
        }

        #monthChipsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 0.2rem;
            min-height: 0;
        }

        .month-chip {
            padding: 9px 15px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.58);
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(47, 91, 255, 0.14), inset 0 1px 0 rgba(255,255,255,0.55);
            animation: chipPop 0.32s cubic-bezier(0.16, 1, 0.3, 1) both;
            cursor: default;
        }

        .month-chip.due {
            background: rgba(253, 236, 236, 0.7);
            border-color: rgba(245, 181, 181, 0.9);
            color: var(--danger-dark);
        }

        .month-chip.advance {
            background: rgba(91, 110, 245, 0.13);
            border-color: rgba(91, 110, 245, 0.24);
            color: var(--primary-dark);
        }

        @keyframes chipPop {
            from { opacity: 0; transform: scale(0.82) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (hover: hover) {
            .month-chip:hover {
                transform: translateY(-2px) scale(1.03);
                box-shadow: 0 12px 26px rgba(47, 91, 255, 0.18), inset 0 1px 0 rgba(255,255,255,0.65);
            }
        }

        .summary-note {
            display: none;
            margin-top: 0.85rem;
            padding: 0.85rem 1rem;
            background: rgba(91, 110, 245, 0.09);
            border: 1px solid rgba(91, 110, 245, 0.18);
            border-radius: 14px;
            color: var(--text-secondary);
            font-size: 0.92rem;
            line-height: 1.4;
        }

        .summary-note.visible {
            display: block;
        }

        .submit-btn {
            width: 100%;
            min-height: 54px;
            padding: 15px 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--bg-right));
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(47, 91, 255, 0.32);
            margin-top: 0.4rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-105%);
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.42), transparent);
            transition: transform 0.52s ease;
        }

        @media (hover: hover) {
            .submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 16px 34px rgba(47, 91, 255, 0.4);
            }
            .submit-btn:hover::after {
                transform: translateX(105%);
            }
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .modal,
        .toast-modal {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            min-height: 100dvh;
            background: rgba(20, 24, 55, 0.58);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        .modal.show,
        .toast-modal.show {
            display: flex;
        }

        .modal-content,
        .toast-content {
            width: min(92vw, 470px);
            max-height: 88dvh;
            overflow-y: auto;
            background: rgba(245, 247, 251, 0.96);
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 22px;
            padding: 1.45rem;
            box-shadow: 0 24px 70px rgba(0,0,0,0.28);
            animation: modalSmoothPop 0.28s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSmoothPop {
            from { opacity: 0; transform: scale(0.9) translateY(18px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header,
        .toast-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 1.05rem;
            text-align: center;
            text-transform: uppercase;
        }

        .modal-info {
            background: rgba(255,255,255,0.55);
            border: 1px solid rgba(214, 220, 232, 0.8);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.85rem;
            margin-top: 1.1rem;
        }

        .modal-btn,
        .toast-btn {
            flex: 1;
            min-height: 48px;
            padding: 12px 14px;
            border: none;
            border-radius: 13px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .cancel-btn {
            background: rgba(107, 114, 128, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(107, 114, 128, 0.16);
        }

        .confirm-btn,
        .toast-btn {
            background: linear-gradient(135deg, var(--primary-dark), var(--bg-right));
            color: white;
            box-shadow: 0 10px 24px rgba(47, 91, 255, 0.24);
        }

        .cancel-btn:hover,
        .confirm-btn:hover,
        .toast-btn:hover {
            transform: translateY(-1px);
        }

        .toast-content {
            text-align: center;
            max-width: 390px;
        }

        .toast-icon {
            width: 58px;
            height: 58px;
            margin: 0 auto 0.85rem;
            display: grid;
            place-items: center;
            border-radius: 50%;
            font-size: 1.7rem;
            font-weight: 900;
        }

        .toast-icon.success {
            background: rgba(34, 197, 94, 0.14);
            color: var(--success);
        }

        .toast-icon.cancelled {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        .toast-message {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.45;
            margin-bottom: 1.2rem;
        }

        @media (max-width: 520px) {
            body {
                padding: 14px 10px 22px;
            }

            .page-wrap {
                min-height: auto;
                display: block;
            }

            .container {
                max-width: 100%;
                border-radius: 20px;
                padding: 20px 15px;
            }

            h1 {
                margin-bottom: 1.25rem;
            }

            label {
                font-size: 0.86rem;
                margin-bottom: 0.45rem;
            }

            select,
            input {
                height: 50px;
                font-size: 16px;
                border-radius: 13px;
            }

            .info-row,
            .modal-row {
                align-items: flex-start;
            }

            .modal-buttons {
                flex-direction: column;
            }

            .modal-content,
            .toast-content {
                width: 94vw;
                padding: 1.15rem;
                border-radius: 19px;
            }

            .month-chip {
                font-size: 0.84rem;
                padding: 8px 12px;
            }
        }

        @media (min-width: 900px) {
            .page-wrap {
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <main class="page-wrap">
        <div class="container">
            <h1>Maintenance Update</h1>

            <div class="form-group no-margin">
                <label for="flatSelect">Select Flat <span class="required">*</span></label>
                <select id="flatSelect" required>
                    <option value="">Choose a flat...</option>
                    <option value="101|Rajesh Kumar">101 - Rajesh Kumar</option>
                    <option value="102|Priya Sharma">102 - Priya Sharma</option>
                    <option value="103|Amit Patel">103 - Amit Patel</option>
                    <option value="104|Sunita Reddy">104 - Sunita Reddy</option>
                    <option value="105|Vikram Singh">105 - Vikram Singh</option>
                    <option value="201|Anita Desai">201 - Anita Desai</option>
                    <option value="202|Karan Mehta">202 - Karan Mehta</option>
                    <option value="203|Neha Gupta">203 - Neha Gupta</option>
                    <option value="204|Sanjay Verma">204 - Sanjay Verma</option>
                    <option value="205|Deepa Nair">205 - Deepa Nair</option>
                    <option value="301|Rahul Joshi">301 - Rahul Joshi</option>
                    <option value="302|Kavita Iyer">302 - Kavita Iyer</option>
                    <option value="303|Arun Rao">303 - Arun Rao</option>
                    <option value="304|Meera Shah">304 - Meera Shah</option>
                    <option value="305|Vijay Menon">305 - Vijay Menon</option>
                </select>
            </div>

            <div id="infoCard" class="info-card">
                <h3><span id="cardFlatName">Flat Info</span></h3>
                <div class="info-row">
                    <span class="info-label">Total Due</span>
                    <span class="info-value amount" id="totalDue">₹0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Pending Months</span>
                    <span class="info-value pending" id="pendingMonths">-</span>
                </div>
            </div>

            <div class="form-group">
                <label for="amountInput">Amount <span class="required">*</span></label>
                <select id="amountInput" required>
                    <option value="">Select amount...</option>
                    <option value="1500">₹1,500 - 1 Month</option>
                    <option value="3000">₹3,000 - 2 Months</option>
                    <option value="4500">₹4,500 - 3 Months</option>
                    <option value="6000">₹6,000 - 4 Months</option>
                    <option value="7500">₹7,500 - 5 Months</option>
                    <option value="9000">₹9,000 - 6 Months</option>
                    <option value="10500">₹10,500 - 7 Months</option>
                    <option value="12000">₹12,000 - 8 Months</option>
                    <option value="13500">₹13,500 - 9 Months</option>
                    <option value="15000">₹15,000 - 10 Months</option>
                    <option value="16500">₹16,500 - 11 Months</option>
                    <option value="18000">₹18,000 - 12 Months</option>
                </select>
                <div id="chipsLabel" class="chips-label">Months covered</div>
                <div id="monthChipsContainer"></div>
                <div id="summaryNote" class="summary-note"></div>
            </div>

            <div class="form-group">
                <label for="paymentMethod">Payment Method <span class="required">*</span></label>
                <select id="paymentMethod" required>
                    <option value="">Choose payment method...</option>
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                </select>
            </div>

            <div class="form-group">
                <label for="collectedBy">Collected By <span class="required">*</span></label>
                <input type="text" id="collectedBy" placeholder="Enter collector name" required>
            </div>

            <button class="submit-btn" onclick="showConfirmation()">Mark as Paid</button>
        </div>
    </main>

    <div id="confirmModal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">Confirm Payment</div>
            <div class="modal-info">
                <div class="modal-row">
                    <span class="modal-label">Flat No & Name</span>
                    <span class="modal-value" id="modalFlat">-</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Months</span>
                    <span class="modal-value" id="modalMonths">-</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Amount</span>
                    <span class="modal-value highlight" id="modalAmount">₹0</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Payment Mode</span>
                    <span class="modal-value" id="modalPayment">-</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Collected By</span>
                    <span class="modal-value" id="modalCollector">-</span>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="cancelPaymentUpdate()">Cancel</button>
                <button class="modal-btn confirm-btn" onclick="confirmPayment()">Confirm</button>
            </div>
        </div>
    </div>

    <div id="statusPopup" class="toast-modal" aria-hidden="true">
        <div class="toast-content">
            <div id="toastIcon" class="toast-icon success">✓</div>
            <div id="toastTitle" class="toast-title">Updated</div>
            <div id="toastMessage" class="toast-message">Maintenance payment updated successfully.</div>
            <button class="toast-btn" onclick="closeStatusPopup()">Okay</button>
        </div>
    </div>

    <script>
        const flatData = {
            '101|Rajesh Kumar': { due: 6000, pendingMonths: ['November 2025', 'December 2025', 'January 2026', 'February 2026'] },
            '102|Priya Sharma': { due: 3000, pendingMonths: ['February 2026', 'March 2026'] },
            '103|Amit Patel': { due: 9000, pendingMonths: ['October 2025', 'November 2025', 'December 2025', 'January 2026', 'February 2026', 'March 2026'] },
            '104|Sunita Reddy': { due: 1500, pendingMonths: ['March 2026'] },
            '105|Vikram Singh': { due: 0, pendingMonths: [] },
            '201|Anita Desai': { due: 3000, pendingMonths: ['January 2026', 'February 2026'] },
            '202|Karan Mehta': { due: 1500, pendingMonths: ['March 2026'] },
            '203|Neha Gupta': { due: 4500, pendingMonths: ['January 2026', 'February 2026', 'March 2026'] },
            '204|Sanjay Verma': { due: 0, pendingMonths: [] },
            '205|Deepa Nair': { due: 3000, pendingMonths: ['February 2026', 'March 2026'] },
            '301|Rahul Joshi': { due: 1500, pendingMonths: ['March 2026'] },
            '302|Kavita Iyer': { due: 6000, pendingMonths: ['December 2025', 'January 2026', 'February 2026', 'March 2026'] },
            '303|Arun Rao': { due: 0, pendingMonths: [] },
            '304|Meera Shah': { due: 3000, pendingMonths: ['February 2026', 'March 2026'] },
            '305|Vijay Menon': { due: 1500, pendingMonths: ['March 2026'] }
        };

        const monthlyRate = 1500;
        let selectedFlat = null;
        let currentPendingMonths = [];
        let currentCoveredMonths = [];

        const monthNames = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        function parseMonthYear(monthYear) {
            const parts = monthYear.split(' ');
            const year = parseInt(parts[1], 10);
            const month = monthNames.indexOf(parts[0]);
            return new Date(year, month, 1);
        }

        function formatMonthYear(date) {
            return `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
        }

        function addMonths(date, monthsToAdd) {
            const newDate = new Date(date.getFullYear(), date.getMonth() + monthsToAdd, 1);
            return newDate;
        }

        function generateMonthsList(startFromMonth = null, count = 36) {
            let startDate;

            if (startFromMonth) {
                startDate = parseMonthYear(startFromMonth);
            } else {
                const today = new Date();
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
            }

            const list = [];
            for (let i = 0; i < count; i++) {
                list.push(formatMonthYear(addMonths(startDate, i)));
            }
            return list;
        }

        function getMonthAfterLastPending() {
            if (currentPendingMonths.length === 0) {
                return formatMonthYear(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
            }
            const lastPending = currentPendingMonths[currentPendingMonths.length - 1];
            return formatMonthYear(addMonths(parseMonthYear(lastPending), 1));
        }

        function calculateCoveredMonths(amount) {
            const monthsCount = Math.floor(amount / monthlyRate);
            if (monthsCount <= 0) return [];

            let monthsToShow = [...currentPendingMonths];

            if (monthsToShow.length < monthsCount) {
                const remaining = monthsCount - monthsToShow.length;
                const nextStartMonth = getMonthAfterLastPending();
                const futureMonths = generateMonthsList(nextStartMonth, remaining + 24)
                    .filter(month => !monthsToShow.includes(month));

                monthsToShow = [
                    ...monthsToShow,
                    ...futureMonths.slice(0, remaining)
                ];
            } else {
                monthsToShow = monthsToShow.slice(0, monthsCount);
            }

            return monthsToShow;
        }

        function renderMonthChips(months) {
            const container = document.getElementById('monthChipsContainer');
            const chipsLabel = document.getElementById('chipsLabel');
            const summaryNote = document.getElementById('summaryNote');

            container.innerHTML = '';
            currentCoveredMonths = months;

            if (months.length === 0) {
                chipsLabel.classList.remove('visible');
                summaryNote.classList.remove('visible');
                summaryNote.textContent = '';
                return;
            }

            chipsLabel.classList.add('visible');

            let dueCount = 0;
            let advanceCount = 0;

            months.forEach((month, index) => {
                const chip = document.createElement('span');
                const isDue = currentPendingMonths.includes(month);

                chip.className = `month-chip ${isDue ? 'due' : 'advance'}`;
                chip.textContent = month;
                chip.style.animationDelay = `${index * 0.035}s`;

                if (isDue) dueCount++;
                else advanceCount++;

                container.appendChild(chip);
            });

            summaryNote.classList.add('visible');
            summaryNote.textContent = `${dueCount} due month${dueCount !== 1 ? 's' : ''} and ${advanceCount} advance month${advanceCount !== 1 ? 's' : ''} covered.`;
        }

        document.getElementById('flatSelect').addEventListener('change', function() {
            const flatValue = this.value;
            selectedFlat = flatValue || null;

            if (!flatValue) {
                document.getElementById('infoCard').classList.remove('visible');
                currentPendingMonths = [];
                currentCoveredMonths = [];
                document.getElementById('amountInput').value = '';
                renderMonthChips([]);
                return;
            }

            const data = flatData[flatValue];
            const [flatNo, name] = flatValue.split('|');
            currentPendingMonths = [...data.pendingMonths];

            document.getElementById('cardFlatName').textContent = `${flatNo} - ${name}`;
            document.getElementById('totalDue').textContent = `₹${data.due.toLocaleString('en-IN')}`;
            document.getElementById('pendingMonths').textContent =
                data.pendingMonths.length > 0 ? data.pendingMonths.join(', ') : 'All Clear ✓';
            document.getElementById('infoCard').classList.add('visible');

            document.getElementById('amountInput').value = '';
            renderMonthChips([]);
        });

        document.getElementById('amountInput').addEventListener('change', function() {
            const amount = parseInt(this.value, 10) || 0;

            if (!selectedFlat || amount === 0) {
                renderMonthChips([]);
                return;
            }

            const monthsToShow = calculateCoveredMonths(amount);
            renderMonthChips(monthsToShow);
        });

        function showConfirmation() {
            const flatSelect = document.getElementById('flatSelect');
            const amountInput = document.getElementById('amountInput');
            const paymentMethod = document.getElementById('paymentMethod');
            const collectedBy = document.getElementById('collectedBy');

            if (!flatSelect.value) {
                alert('Please select a flat');
                flatSelect.focus();
                return;
            }

            if (!amountInput.value || parseInt(amountInput.value, 10) <= 0) {
                alert('Please select a valid amount');
                amountInput.focus();
                return;
            }

            if (currentCoveredMonths.length === 0) {
                alert('Please select an amount to generate covered months');
                amountInput.focus();
                return;
            }

            if (!paymentMethod.value) {
                alert('Please select a payment method');
                paymentMethod.focus();
                return;
            }

            if (!collectedBy.value.trim()) {
                alert('Please enter collector name');
                collectedBy.focus();
                return;
            }

            const [flatNo, name] = flatSelect.value.split('|');
            const amount = parseInt(amountInput.value, 10);

            document.getElementById('modalFlat').textContent = `${flatNo} - ${name}`;
            document.getElementById('modalMonths').textContent = currentCoveredMonths.join(', ');
            document.getElementById('modalAmount').textContent = `₹${amount.toLocaleString('en-IN')}`;
            document.getElementById('modalPayment').textContent = paymentMethod.value;
            document.getElementById('modalCollector').textContent = collectedBy.value.trim();

            openModal('confirmModal');
        }

        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        function cancelPaymentUpdate() {
            closeModal('confirmModal');
            showStatusPopup('cancelled', 'Cancelled', 'Payment update cancelled. No changes were recorded.');
        }

        function confirmPayment() {
            closeModal('confirmModal');
            showStatusPopup('success', 'Updated', 'Maintenance payment updated successfully.');

            document.getElementById('flatSelect').value = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('paymentMethod').value = '';
            document.getElementById('collectedBy').value = '';
            document.getElementById('infoCard').classList.remove('visible');
            currentPendingMonths = [];
            currentCoveredMonths = [];
            selectedFlat = null;
            renderMonthChips([]);
        }

        function showStatusPopup(type, title, message) {
            const icon = document.getElementById('toastIcon');
            const titleEl = document.getElementById('toastTitle');
            const messageEl = document.getElementById('toastMessage');

            icon.className = `toast-icon ${type}`;
            icon.textContent = type === 'success' ? '✓' : '×';
            titleEl.textContent = title;
            messageEl.textContent = message;

            openModal('statusPopup');
        }

        function closeStatusPopup() {
            closeModal('statusPopup');
        }

        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) {
                cancelPaymentUpdate();
            }
        });

        document.getElementById('statusPopup').addEventListener('click', function(e) {
            if (e.target === this) {
                closeStatusPopup();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('confirmModal').classList.contains('show')) {
                    cancelPaymentUpdate();
                }
                if (document.getElementById('statusPopup').classList.contains('show')) {
                    closeStatusPopup();
                }
            }
        });
    </script>
</body>
</html>
